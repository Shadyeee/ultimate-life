<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Name | Ultimate Life</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/course.css" />
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/header.js"></script>

  </head>

  <body>
  <div id="header"></div>

    <main class="container">
      <!-- HERO -->
      <section class="hero">
        <div>
          <span class="tag">Type</span>
          <h1>Course Name</h1>
          <p>Description</p>
          <h2>499 EGP</h2>
          <button class="btn">Enroll Now</button>
        </div>

        <div>
          <img
            src="pics/course-temp.jpg"
          />
        </div>
      </section>

      <!-- DETAILS -->
      <section class="section">
        <div class="grid">
          <div class="card">
            <h2>What you will learn</h2>
            <p>Build scalable React applications</p>
            <p>Master Next.js</p>
            <p>Advanced CSS</p>
          </div>

          <div class="card">
            <h3>Instructor</h3>
            <p>Alex Rivera</p>
            <p>Senior Frontend Engineer</p>
          </div>
        </div>
      </section>

      <!-- CURRICULUM -->
      <section class="section">
        <h2>Course Curriculum</h2>

        <details open>
          <summary>Foundations</summary>
          <p>HTML</p>
          <p>CSS</p>
        </details>

        <details>
          <summary>Advanced</summary>
          <p>React</p>
        </details>
      </section>

      <!-- CTA -->
      <section class="cta">
        <h2>Ready to launch your career?</h2>
        <button class="btn">Reserve Your Spot</button>
      </section>
    </main>

    <footer>© 2026 Ultimate Life</footer>
  </body>
</html>
